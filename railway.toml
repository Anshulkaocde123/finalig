[build]
builder = "nixpacks"

[build.nixpacks]
# Only install server dependencies (frontend deploys to Vercel separately)
installCmd = "cd server && npm ci --omit=dev"

[deploy]
startCommand = "cd server && node start.js"
restartPolicyMaxRetries = 5
healthcheckPath = "/api/health"
healthcheckTimeout = 300
